<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0f;--surface:#17171a;--surface2:#1f1f24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0ee;--muted:#888884;--hint:#555552;--hot:#ff5c35;--rise:#4ec87a;--steady:#555552;--accent:#c8b8ff;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;}
header h1{font-size:1rem;font-weight:500;color:var(--accent);letter-spacing:0.04em;font-family:monospace;}
header p{font-size:0.75rem;color:var(--muted);font-family:monospace;}
.tabs{display:flex;padding:0 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{font-size:0.78rem;padding:0.65rem 1.1rem;background:transparent;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;font-family:inherit;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.main{padding:1.25rem 1.5rem 3rem;max-width:1100px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.label{font-size:0.72rem;color:var(--muted);font-family:monospace;white-space:nowrap;}
select,input[type=text]{font-size:0.78rem;padding:5px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);outline:none;font-family:inherit;}
select:focus,input[type=text]:focus{border-color:rgba(200,184,255,0.4);}
input[type=text]::placeholder{color:var(--hint);}
.sub-label{font-size:0.7rem;color:var(--hint);font-family:monospace;margin-bottom:0.75rem;}
.picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;margin-bottom:1.25rem;max-height:260px;overflow-y:auto;padding:4px;}
.pick-btn{font-size:0.72rem;padding:5px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;text-align:left;transition:all 0.12s;font-family:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-btn.selected{background:rgba(200,184,255,0.12);border-color:rgba(200,184,255,0.4);color:var(--accent);}
.pick-btn:hover:not(.selected){border-color:var(--border2);color:var(--text);}
.pick-info{font-size:0.7rem;color:var(--muted);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:1.25rem;}
.card{background:var(--surface);border-radius:7px;padding:10px 12px;}
.card-name{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.card-val{font-size:1.2rem;font-weight:500;font-family:monospace;line-height:1;margin-bottom:3px;}
.card-sub{font-size:0.68rem;color:var(--muted);font-family:monospace;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{font-size:0.6rem;padding:1px 5px;border-radius:3px;font-family:monospace;}
.badge-hot{background:rgba(255,92,53,0.15);color:var(--hot);border:1px solid rgba(255,92,53,0.3);}
.badge-rise{background:rgba(78,200,122,0.12);color:var(--rise);border:1px solid rgba(78,200,122,0.25);}
.badge-steady{background:rgba(85,85,82,0.2);color:#888884;border:1px solid rgba(85,85,82,0.3);}
.chart-wrap{position:relative;width:100%;}
.legend{display:flex;gap:1rem;margin-bottom:0.6rem;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:0.7rem;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.tbl-wrap{overflow-x:auto;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{font-size:0.68rem;color:var(--muted);font-weight:400;text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:monospace;}
th:first-child,th:nth-child(2){text-align:left;}
td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:monospace;font-size:0.76rem;color:var(--muted);}
td:first-child{text-align:left;color:var(--text);font-family:inherit;}
td:nth-child(2){text-align:left;}
tr:hover td{background:var(--surface);}
.td-hot{color:var(--hot)!important;}
.td-rise{color:var(--rise)!important;}
.g-tabs{display:flex;gap:6px;margin-bottom:1rem;}
.g-tab{font-size:0.75rem;padding:4px 14px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;}
.g-tab.active{background:rgba(200,184,255,0.12);border-color:rgba(200,184,255,0.4);color:var(--accent);}
</style>
</head>

<header>
  <h1>新世界 数値トラッカー</h1>
  <p>101 candidates · updated 4/4</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('watch')">マイリスト</button>
  <button class="tab" onclick="switchTab('all')">全員テーブル</button>
  <button class="tab" onclick="switchTab('trend')">推移グラフ</button>
</div>
<div class="main">

  <div id="tab-watch" class="section active">
    <div class="row">
      <span class="label">練習生を選ぶ（最大12名）</span>
      <span class="pick-info" id="pick-count">0 / 12 選択中</span>
    </div>
    <div class="row">
      <input type="text" id="pick-search" placeholder="名前 or ABCで絞り込み..." oninput="filterPicker()" style="width:200px;">
      <select id="pick-sort" onchange="filterPicker()">
        <option value="abc">ABC順</option>
        <option value="cur">再生数順</option>
        <option value="growth">伸び率順</option>
        <option value="rank">投票順位順</option>
      </select>
      <button onclick="clearSelection()" style="font-size:0.72rem;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;">クリア</button>
    </div>
    <div class="picker" id="picker"></div>
    <div id="watch-content"></div>
  </div>

  <div id="tab-all" class="section">
    <div class="row">
      <span class="label">並び替え:</span>
      <select id="all-sort" onchange="renderAll()">
        <option value="growth">週間伸び率</option>
        <option value="growabs">週間伸び数</option>
        <option value="cur">再生数（多い順）</option>
        <option value="rank">投票順位</option>
        <option value="abc">ABC順</option>
      </select>
      <select id="all-filter" onchange="renderAll()">
        <option value="all">全員</option>
        <option value="hot">急上昇のみ</option>
        <option value="rise">上昇中以上</option>
      </select>
    </div>
    <div class="tbl-wrap"><table id="all-table"></table></div>
  </div>

  <div id="tab-trend" class="section">
    <p class="sub-label">マイリストで選んだ練習生の推移を表示します</p>
    <div class="g-tabs">
      <button class="g-tab active" onclick="switchGraph('play')">再生数推移</button>
      <button class="g-tab" onclick="switchGraph('rank')">順位推移</button>
    </div>
    <div class="chart-wrap" style="height:510px;"><canvas id="chartTrend"></canvas></div>
  </div>

</div>

["宮里 拓利","TAKUTO.M",80],["南平 達矢","TATSUYA",43],["森井 輝","TERU",100],
["北林 天虎","TETORA",89],["藤芳 辰弥","TOKIYA",92],["増田 倫希","TOMOKI",76],
["濱田 永遠","TOWA",16],["アギナルド・トリスタン・ジェームス","TRISTAN",70],
["リー・ウェイゼ","WEIZE",53],["ヨハン・エマニュエル","YOHAN",78],
["矢田 佳暉","YOSHIKI",1],["後藤 結","YUKI",17],["岡田 侑磨","YUMA",47],
["安部 結蘭","YURA",4],["大林 悠成","YUSEI.O",24],["佐野 由征","YUSEI.S",60],
["板倉 悠太","YUTA",19],
];

const voteMap = {};
rawVote.forEach(r => { voteMap[r[0]] = r.slice(2); });

const dataRaw = rawPlay.map(r => {
  const name=r[0], reading=r[1], vals=r.slice(2);
  const cur=vals[4], prev=vals[3];
  const growAbs = prev!=null ? +(cur-prev).toFixed(2) : null;
  const growPct = (prev!=null&&prev>0) ? +((cur-prev)/prev*100).toFixed(1) : null;
  const votes = voteMap[name]||[];
  return {name,reading,vals,cur,prev,growAbs,growPct,tier:'steady',votes};
});

(function(){
  const w=dataRaw.filter(d=>d.growPct!=null).sort((a,b)=>b.growPct-a.growPct);
  const n=w.length, t15=Math.ceil(n*0.15), t30=Math.ceil(n*0.30);
  w.forEach((d,i)=>{
    if(i<t15&&d.growPct>=20) d.tier='hot';
    else if(i<t30&&d.growPct>=10) d.tier='rise';
  });
})();

const data=dataRaw;
const tierLabel={hot:'急上昇',rise:'上昇中',steady:'安定'};
const tierColor={hot:'#ff5c35',rise:'#4ec87a',steady:'#555552'};

let selected=[], chartTrend=null, currentGraph='play';

function saveSelection(){
  try{ localStorage.setItem('shinsekai_selected', JSON.stringify(selected)); }catch(e){}
}

function loadSelection(){
  try{
    const saved = localStorage.getItem('shinsekai_selected');
    if(saved) selected = JSON.parse(saved).filter(n => data.find(d=>d.name===n));
  }catch(e){}
}

function switchTab(t){
  ['watch','all','trend'].forEach((id,i)=>{
    document.getElementById('tab-'+id).classList.toggle('active',id===t);
    document.querySelectorAll('.tab')[i].classList.toggle('active',id===t);
  });
  if(t==='all') renderAll();
  if(t==='trend') renderTrend();
}

function switchGraph(type){
  currentGraph=type;
  document.querySelectorAll('.g-tab').forEach((el,i)=>el.classList.toggle('active',['play','rank'][i]===type));
  renderTrend();
}

function sortList(list,sort){
  if(sort==='abc') list.sort((a,b)=>a.reading.localeCompare(b.reading));
  else if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else if(sort==='cur') list.sort((a,b)=>b.cur-a.cur);
  else if(sort==='growth') list.sort((a,b)=>(b.growPct||0)-(a.growPct||0));
  else if(sort==='growabs') list.sort((a,b)=>(b.growAbs||0)-(a.growAbs||0));
  else if(sort==='rank') list.sort((a,b)=>(a.votes[0]||999)-(b.votes[0]||999));
  return list;
}

function filterPicker(){
  const q=document.getElementById('pick-search').value.toLowerCase();
  const sort=document.getElementById('pick-sort').value;
  let list=[...data];
  if(q) list=list.filter(d=>d.name.includes(q)||d.reading.toLowerCase().includes(q));
  sortList(list,sort);
  document.getElementById('picker').innerHTML=list.map(d=>{
    const sel=selected.includes(d.name);
    return `<button class="pick-btn ${sel?'selected':''}" onclick="togglePick('${d.name}')" title="${d.name}（${d.reading}）">${d.name}</button>`;
  }).join('');
}

function togglePick(name){
  if(selected.includes(name)) selected=selected.filter(n=>n!==name);
  else{ if(selected.length>=12) return; selected.push(name); }
  saveSelection();
  document.getElementById('pick-count').textContent=selected.length+' / 12 選択中';
  filterPicker(); renderWatch();
  if(document.getElementById('tab-trend').classList.contains('active')) renderTrend();
}

function clearSelection(){
  selected=[];
  saveSelection();
  document.getElementById('pick-count').textContent='0 / 12 選択中';
  filterPicker(); renderWatch();
}

function renderWatch(){
  const el=document.getElementById('watch-content');
  if(!selected.length){el.innerHTML='<p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;">上のリストから練習生を選んでください</p>';return;}
  const items=selected.map(n=>data.find(d=>d.name===n)).filter(Boolean);
  const cards=items.map(d=>{
    const gStr=d.growPct!=null?'+'+d.growPct+'%':'-';
    const gAbsStr=d.growAbs!=null?'+'+d.growAbs+'万':'-';
    const vStr=d.votes.length?VOTE_DATES[0]+': '+d.votes[0]+'位':'投票未発表';
    return `<div class="card">
      <div class="card-name">${d.name} <span style="font-size:0.6rem;color:var(--hint);font-family:monospace;">${d.reading}</span></div>
      <div class="card-val" style="color:${tierColor[d.tier]}">${gStr}</div>
      <div class="card-sub">${gAbsStr} &nbsp;${d.cur.toFixed(1)}万 <span class="badge badge-${d.tier}">${tierLabel[d.tier]}</span></div>
      <div style="font-size:0.65rem;color:var(--hint);margin-top:3px;font-family:monospace;">${vStr}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="legend">
    <span class="leg"><span class="leg-dot" style="background:var(--hot)"></span>急上昇（上位15%かつ+20%↑）</span>
    <span class="leg"><span class="leg-dot" style="background:var(--rise)"></span>上昇中（上位30%かつ+10%↑）</span>
  </div><div class="cards">${cards}</div>`;
}

function renderAll(){
  const sort=document.getElementById('all-sort').value;
  const filter=document.getElementById('all-filter').value;
  let list=[...data];
  if(filter==='hot') list=list.filter(d=>d.tier==='hot');
  if(filter==='rise') list=list.filter(d=>d.tier==='hot'||d.tier==='rise');
  sortList(list,sort);
  const vHeaders=VOTE_DATES.map(d=>`<th>${d}順位</th>`).join('');
  let html=`<thead><tr><th style="text-align:left;">名前</th><th>reading</th><th>現在（万回）</th><th>週間+（万）</th><th>週間伸び率</th>${vHeaders}</tr></thead><tbody>`;
  list.forEach(d=>{
    const cls=d.tier==='hot'?'td-hot':d.tier==='rise'?'td-rise':'';
    const gPct=d.growPct!=null?`<span class="${cls}">+${d.growPct}%</span>`:'-';
    const gAbs=d.growAbs!=null?`<span class="${cls}">${d.growAbs>0?'+':''}${d.growAbs}</span>`:'-';
    const votes=VOTE_DATES.map((_,i)=>`<td>${d.votes[i]!=null?d.votes[i]+'位':'-'}</td>`).join('');
    html+=`<tr><td>${d.name}</td><td style="color:var(--hint);font-size:0.7rem;">${d.reading}</td><td>${d.cur.toFixed(1)}</td><td>${gAbs}</td><td>${gPct}</td>${votes}</tr>`;
  });
  html+='</tbody>';
  document.getElementById('all-table').innerHTML=html;
}

function renderTrend(){
  const ctx=document.getElementById('chartTrend');
  if(chartTrend){chartTrend.destroy();chartTrend=null;}
  if(!selected.length) return;
  const items=selected.map(n=>data.find(d=>d.name===n)).filter(Boolean);

  if(currentGraph==='play'){
    chartTrend=new Chart(ctx,{
      type:'line',
      data:{
        labels:PLAY_DATES,
        datasets:items.map((d,i)=>({
          label:d.name, data:d.vals,
          borderColor:palette[i%palette.length], backgroundColor:'transparent',
          tension:0.3, pointRadius:4, spanGaps:true,
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#888',font:{size:11},boxWidth:10,padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(1)+'万回':'-'}`}}
        },
        scales:{
          x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'万回',color:'#888',font:{size:11}}}
        }
      }
    });
  } else {
    const withVote=items.filter(d=>d.votes.length>0);
    if(!withVote.length) return;
    chartTrend=new Chart(ctx,{
      type:'line',
      data:{
        labels:VOTE_DATES,
        datasets:withVote.map((d,i)=>({
          label:d.name, data:d.votes,
          borderColor:palette[i%palette.length], backgroundColor:'transparent',
          tension:0.3, pointRadius:5, spanGaps:true,
          datalabels:{display:false},
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#888',font:{size:11},boxWidth:10,padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}位`}},
        },
        scales:{
          x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{reverse:true,ticks:{color:'#888',font:{size:11},callback:v=>v+'位'},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'順位（上が1位）',color:'#888',font:{size:11}}}
        },
        animation:{onComplete: function(){
          const chart=this;
          const ctx2=chart.ctx;
          ctx2.save();
          ctx2.font='bold 11px monospace';
          ctx2.textAlign='center';
          chart.data.datasets.forEach((ds,di)=>{
            const meta=chart.getDatasetMeta(di);
            if(meta.hidden) return;
            meta.data.forEach((pt,pi)=>{
              const val=ds.data[pi];
              if(val==null) return;
              ctx2.fillStyle=ds.borderColor;
              ctx2.fillText(val+'位', pt.x, pt.y-10);
            });
          });
          ctx2.restore();
        }}
      }
    });
  }
}

loadSelection();
document.getElementById('pick-count').textContent=selected.length+' / 12 選択中';
filterPicker();
renderWatch();
</script>
</body>
</html>
