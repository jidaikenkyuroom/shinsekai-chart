<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新世界 数値トラッカー</title>
<meta property="og:title" content="新世界 数値トラッカー">
<meta property="og:description" content="練習生101名の再生数・人気投票順位を週次で追跡するダッシュボード">
<meta property="og:url" content="https://jidaikenkyuroom.github.io/shinsekai-chart/">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0f;--surface:#17171a;--surface2:#1f1f24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0ee;--muted:#888884;--hint:#555552;--hot:#ff5c35;--rise:#4ec87a;--steady:#555552;--accent:#c8b8ff;--cls-up:#4ec87a;--cls-keep:#888884;--cls-down:#ff5c35;--cls-aa:#f0c040;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;}
header h1{font-size:1rem;font-weight:500;color:var(--accent);letter-spacing:0.04em;font-family:monospace;}
header p{font-size:0.75rem;color:var(--muted);font-family:monospace;}
.tabs{display:flex;padding:0 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{font-size:0.78rem;padding:0.65rem 1.1rem;background:transparent;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;font-family:inherit;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.main{padding:1.25rem 1.5rem 3rem;max-width:1100px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.label{font-size:0.72rem;color:var(--muted);font-family:monospace;white-space:nowrap;}
select,input[type=text]{font-size:0.78rem;padding:5px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);outline:none;font-family:inherit;}
select:focus,input[type=text]:focus{border-color:rgba(200,184,255,0.4);}
input[type=text]::placeholder{color:var(--hint);}
.sub-label{font-size:0.7rem;color:var(--hint);font-family:monospace;margin-bottom:0.75rem;}
.picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;margin-bottom:1.25rem;max-height:260px;overflow-y:auto;padding:4px;}
.pick-btn{font-size:0.72rem;padding:5px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;text-align:left;transition:all 0.12s;font-family:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-btn.selected{background:rgba(200,184,255,0.12);border-color:rgba(200,184,255,0.4);color:var(--accent);}
.pick-btn:hover:not(.selected){border-color:var(--border2);color:var(--text);}
.pick-info{font-size:0.7rem;color:var(--muted);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:1.25rem;}
.card{background:var(--surface);border-radius:7px;padding:10px 12px;}
.card-name{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.card-val{font-size:1.2rem;font-weight:500;font-family:monospace;line-height:1;margin-bottom:3px;}
.card-sub{font-size:0.68rem;color:var(--muted);font-family:monospace;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{font-size:0.6rem;padding:1px 5px;border-radius:3px;font-family:monospace;}
.badge-hot{background:rgba(255,92,53,0.15);color:var(--hot);border:1px solid rgba(255,92,53,0.3);}
.badge-rise{background:rgba(78,200,122,0.12);color:var(--rise);border:1px solid rgba(78,200,122,0.25);}
.badge-steady{background:rgba(85,85,82,0.2);color:#888884;border:1px solid rgba(85,85,82,0.3);}
.chart-wrap{position:relative;width:100%;}
.legend{display:flex;gap:1rem;margin-bottom:0.6rem;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:0.7rem;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.tbl-wrap{overflow-x:auto;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{font-size:0.68rem;color:var(--muted);font-weight:400;text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:monospace;}
th:first-child,th:nth-child(2){text-align:left;}
td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:monospace;font-size:0.76rem;color:var(--muted);}
td:first-child{text-align:left;color:var(--text);font-family:inherit;}
td:nth-child(2){text-align:left;}
tr:hover td{background:var(--surface);}
.td-hot{color:var(--hot)!important;}
.td-rise{color:var(--rise)!important;}
.badge-cls-up{background:rgba(78,200,122,0.12);color:var(--cls-up);border:1px solid rgba(78,200,122,0.3);}
.badge-cls-keep{background:rgba(136,136,132,0.15);color:var(--cls-keep);border:1px solid rgba(136,136,132,0.3);}
.badge-cls-down{background:rgba(255,92,53,0.12);color:var(--cls-down);border:1px solid rgba(255,92,53,0.25);}
.badge-cls-aa{background:rgba(240,192,64,0.15);color:var(--cls-aa);border:1px solid rgba(240,192,64,0.4);}
.td-cls-up{color:var(--cls-up)!important;}
.td-cls-keep{color:var(--cls-keep)!important;}
.td-cls-down{color:var(--cls-down)!important;}
.td-cls-aa{color:var(--cls-aa)!important;}
.scatter-wrap{position:relative;width:100%;}
.scatter-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:0.75rem;font-size:0.7rem;color:var(--muted);}
.scatter-leg{display:flex;align-items:center;gap:5px;}
.scatter-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.g-tabs{display:flex;gap:6px;margin-bottom:1rem;}
.g-tab{font-size:0.75rem;padding:4px 14px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;}
.g-tab.active{background:rgba(200,184,255,0.12);border-color:rgba(200,184,255,0.4);color:var(--accent);}
.hm-wrap{overflow-x:auto;}
.hm-header-row{display:flex;align-items:center;gap:3px;margin-bottom:3px;padding-left:96px;}
.hm-head{flex:1;min-width:70px;font-size:0.62rem;color:var(--muted);text-align:center;font-family:monospace;}
.hm-row{display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.hm-name{font-size:0.68rem;color:var(--color-text-secondary);width:90px;text-align:right;flex-shrink:0;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px;}
.hm-cell{flex:1;min-width:70px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-family:monospace;font-weight:500;}
</style>
</head>
<body>
<header>
  <h1>新世界 数値トラッカー</h1>
  <p>101 trainees · updated 4/4</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('watch')">マイリスト</button>
  <button class="tab" onclick="switchTab('all')">全員テーブル</button>
  <button class="tab" onclick="switchTab('trend')">推移グラフ</button>
  <button class="tab" onclick="switchTab('heat')">ヒートマップ</button>
  <button class="tab" onclick="switchTab('scatter')">散布図</button>
</div>
<div class="main">

  <div id="tab-watch" class="section active">
    <div class="row">
      <span class="label">練習生を選ぶ（最大12名）</span>
      <span class="pick-info" id="pick-count">0 / 12 選択中</span>
    </div>
    <div class="row">
      <input type="text" id="pick-search" placeholder="名前 or ABCで絞り込み..." oninput="filterPicker()" style="width:200px;">
      <select id="pick-sort" onchange="filterPicker()">
        <option value="abc">ABC順</option>
        <option value="cur">再生数順</option>
        <option value="growth">伸び率順</option>
        <option value="rank">投票順位順</option>
      </select>
      <button onclick="clearSelection()" style="font-size:0.72rem;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;">クリア</button>
    </div>
    <div class="picker" id="picker"></div>
    <div id="watch-content"></div>
  </div>

  <div id="tab-all" class="section">
    <div class="row">
      <span class="label">並び替え:</span>
      <select id="all-sort" onchange="renderAll()">
        <option value="growth">週間伸び率</option>
        <option value="growabs">週間伸び数</option>
        <option value="cur">再生数（多い順）</option>
        <option value="rank">投票順位</option>
        <option value="abc">ABC順</option>
      </select>
      <select id="all-filter" onchange="renderAll()">
        <option value="all">全員</option>
        <option value="hot">急上昇のみ</option>
        <option value="rise">上昇中以上</option>
      </select>
    </div>
    <div class="tbl-wrap"><table id="all-table"></table></div>
  </div>

  <div id="tab-trend" class="section">
    <p class="sub-label">マイリストで選んだ練習生の推移を表示します</p>
    <div class="g-tabs">
      <button class="g-tab active" onclick="switchGraph('play')">再生数推移</button>
      <button class="g-tab" onclick="switchGraph('rank')">順位推移</button>
      <button class="g-tab" onclick="switchGraph('growth')">伸び率推移</button>
    </div>
    <div class="chart-wrap" style="height:510px;"><canvas id="chartTrend"></canvas></div>
  </div>

  <div id="tab-heat" class="section">
    <p class="sub-label">各週の増加数を色の濃さで表示。濃いほど増加大。</p>
    <div class="row">
      <span class="label">並び替え:</span>
      <select id="heat-sort" onchange="renderHeatmap()">
        <option value="abc">ABC順</option>
        <option value="cur">再生数（多い順）</option>
        <option value="growth">週間伸び率順</option>
        <option value="rank">投票順位順</option>
      </select>
    </div>
    <div id="heatmap-wrap"></div>
  </div>

  <div id="tab-scatter" class="section">
    <p class="sub-label">縦軸: 週間伸び率　横軸: 投票順位（左が1位・右が101位）　点の色: クラス変動</p>
    <div class="row">
      <span class="label">クラス絞り込み:</span>
      <select id="scatter-filter" onchange="renderScatter()">
        <option value="all">全員</option>
        <option value="aa">A→Aのみ</option>
        <option value="up">クラスUPのみ</option>
        <option value="keep">クラス維持のみ</option>
        <option value="down">クラスDOWNのみ</option>
        <optgroup label="── 初回クラス ──">
          <option value="first-A">初回Aクラスのみ</option>
          <option value="first-B">初回Bクラスのみ</option>
          <option value="first-C">初回Cクラスのみ</option>
          <option value="first-D">初回Dクラスのみ</option>
          <option value="first-F">初回Fクラスのみ</option>
        </optgroup>
        <optgroup label="── 再評価クラス ──">
          <option value="eval-A">再評価Aクラスのみ</option>
          <option value="eval-B">再評価Bクラスのみ</option>
          <option value="eval-C">再評価Cクラスのみ</option>
          <option value="eval-D">再評価Dクラスのみ</option>
          <option value="eval-F">再評価Fクラスのみ</option>
        </optgroup>
      </select>
    </div>
    <div class="scatter-legend">
      <span class="scatter-leg"><span class="scatter-dot" style="background:#f0c040"></span>A→A（トップ維持）</span>
      <span class="scatter-leg"><span class="scatter-dot" style="background:#4ec87a"></span>クラスUP</span>
      <span class="scatter-leg"><span class="scatter-dot" style="background:#888884"></span>クラス維持</span>
      <span class="scatter-leg"><span class="scatter-dot" style="background:#ff5c35"></span>クラスDOWN</span>
    </div>
    <div style="position:relative;width:100%;margin-bottom:0.5rem;">
      <canvas id="chartScatter" style="width:100%;display:block;cursor:crosshair;"></canvas>
      <div id="scatter-tooltip" style="display:none;position:absolute;background:#1f1f24;border:1px solid rgba(255,255,255,0.13);border-radius:6px;padding:7px 10px;font-size:0.72rem;font-family:monospace;color:#f0f0ee;pointer-events:none;line-height:1.7;z-index:10;"></div>
    </div>
    <p class="sub-label" style="margin-top:0.25rem;">※ 投票順位がない練習生は表示されません</p>
  </div>

</div>

function getClassDiff(first, eval_){ return CLASS_ORDER[first] - CLASS_ORDER[eval_]; }
function getClassLabel(diff, first, eval_){
  if(first==='A' && eval_==='A') return 'aa';
  if(diff > 0) return 'up';
  if(diff === 0) return 'keep';
  return 'down';
}

const dataRaw = rawPlay.map(r => {
  const name=r[0], reading=r[1], vals=r.slice(2);
  const cur=vals[4], prev=vals[3];
  const growAbs = prev!=null ? +(cur-prev).toFixed(2) : null;
  const growPct = (prev!=null&&prev>0) ? +((cur-prev)/prev*100).toFixed(1) : null;
  const votes = voteMap[name]||[];
  const cls = classMap[name]||{first:'-',eval:'-'};
  const diff = cls.first!=='-' ? getClassDiff(cls.first, cls.eval) : null;
  const clsLabel = diff!==null ? getClassLabel(diff, cls.first, cls.eval) : 'keep';
  return {name,reading,vals,cur,prev,growAbs,growPct,tier:'steady',votes,
          classFirst:cls.first,classEval:cls.eval,classDiff:diff,clsLabel};
});

function sortList(list,sort){
  if(sort==='abc') list.sort((a,b)=>a.reading.localeCompare(b.reading));
  else if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else if(sort==='cur') list.sort((a,b)=>b.cur-a.cur);
  else if(sort==='growth') list.sort((a,b)=>(b.growPct||0)-(a.growPct||0));
  else if(sort==='growabs') list.sort((a,b)=>(b.growAbs||0)-(a.growAbs||0));
  else if(sort==='rank') list.sort((a,b)=>(a.votes[0]||999)-(b.votes[0]||999));
  return list;
}

function sparkline(vals, color){
  // 週ごとの伸び率（%）を計算: [3/6→3/14, 3/14→3/21, 3/21→3/28, 3/28→4/4]
  const diffLabels=["3/6\n→3/14","3/14\n→3/21","3/21\n→3/28","3/28\n→4/4"];
  const rates=[];
  for(let i=1;i<vals.length;i++){
    const cur=vals[i], prev=vals[i-1];
    if(cur!=null&&prev!=null&&prev>0) rates.push({v:+((cur-prev)/prev*100).toFixed(1),i:i-1});
    else rates.push({v:null,i:i-1});
  }
  const validRates=rates.map(r=>r.v).filter(v=>v!=null);
  if(!validRates.length) return '';
  const maxR=Math.max(...validRates)||1;
  const W=100, H=36, pad=4, barW=18, gap=4;
  const totalBars=4;
  const unitW=(W-pad*2)/totalBars;
  let bars='';
  rates.forEach((r,idx)=>{
    const bx=pad+idx*unitW+unitW*0.15;
    const bw=unitW*0.7;
    if(r.v==null){
      bars+=`<rect x="${bx}" y="${H-pad-2}" width="${bw}" height="2" rx="1" fill="rgba(128,128,128,0.2)"/>`;
    } else {
      const barH=Math.max(2, (r.v/maxR)*(H-pad*2-8));
      const by=H-pad-barH;
      // 最後の棒だけ少し明るくハイライト
      const isLast=(idx===rates.length-1);
      const alpha=isLast?1:0.55;
      bars+=`<rect x="${bx}" y="${by}" width="${bw}" height="${barH}" rx="1" fill="${color}" opacity="${alpha}"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:36px;display:block;margin-top:5px;" title="週間伸び率推移（左から古い順）">${bars}</svg>`;
}

function renderWatch(){
  const el=document.getElementById('watch-content');
  if(!selected.length){el.innerHTML='<p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;">上のリストから練習生を選んでください</p>';return;}
  const items=selected.map(n=>data.find(d=>d.name===n)).filter(Boolean);
  const cards=items.map(d=>{
    const gStr=d.growPct!=null?'+'+d.growPct+'%':'-';
    const gAbsStr=d.growAbs!=null?'+'+d.growAbs+'万':'-';
    const vStr=d.votes.length?VOTE_DATES[0]+': '+d.votes[0]+'位':'投票未発表';
    const spark=sparkline(d.vals, tierColor[d.tier]);
    return `<div class="card">
      <div class="card-name">${d.name} <span style="font-size:0.6rem;color:var(--hint);font-family:monospace;">${d.reading}</span></div>
      <div class="card-val" style="color:${tierColor[d.tier]}">${gStr}</div>
      <div class="card-sub">${gAbsStr} &nbsp;${d.cur.toFixed(1)}万 <span class="badge badge-${d.tier}">${tierLabel[d.tier]}</span></div>
      <div style="font-size:0.58rem;color:var(--hint);margin-top:5px;font-family:monospace;">週間伸び率推移 →</div>
      ${spark}
      <div style="font-size:0.65rem;color:var(--hint);margin-top:3px;font-family:monospace;">${vStr}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="legend">
    <span class="leg"><span class="leg-dot" style="background:var(--hot)"></span>急上昇（上位15%かつ+20%↑）</span>
    <span class="leg"><span class="leg-dot" style="background:var(--rise)"></span>上昇中（上位30%かつ+10%↑）</span>
  </div><div class="cards">${cards}</div>`;
}

function renderHeatmap(){
  const wrap=document.getElementById('heatmap-wrap');
  const sort=document.getElementById('heat-sort').value;
  const diffLabels=["3/6→3/14","3/14→3/21","3/21→3/28","3/28→4/4"];
  const sorted=[...data];
  sortList(sorted, sort);
  const allDiffs=sorted.flatMap(d=>{
    const diffs=[];
    for(let i=1;i<d.vals.length;i++){
      if(d.vals[i]!=null&&d.vals[i-1]!=null) diffs.push(d.vals[i]-d.vals[i-1]);
    }
    return diffs;
  }).filter(v=>v!=null);
  const maxD=Math.max(...allDiffs)||1;

  let html=`<div class="hm-wrap"><div class="hm-header-row">`;
  diffLabels.forEach(l=>{ html+=`<div class="hm-head">${l}</div>`; });
  html+='</div>';

  sorted.forEach(d=>{
    html+=`<div class="hm-row"><div class="hm-name" title="${d.name}">${d.name}<span style="display:block;font-size:0.58rem;color:var(--hint);">${d.cur.toFixed(1)}万</span></div>`;
    for(let i=1;i<d.vals.length;i++){
      const cur=d.vals[i], prev=d.vals[i-1];
      if(cur==null||prev==null){
        html+=`<div class="hm-cell" style="background:rgba(128,128,128,0.06);color:var(--hint);">-</div>`;
      } else {
        const diff=+(cur-prev).toFixed(2);
        const intensity=Math.min(diff/maxD,1);
        const alpha=0.1+intensity*0.75;
        html+=`<div class="hm-cell" style="background:rgba(78,200,122,${alpha});color:${intensity>0.45?'#085041':'#4ec87a'};">+${diff}</div>`;
      }
    }
    html+='</div>';
  });
  html+='</div>';
  wrap.innerHTML=html;
}

  if(filter==='rise') list=list.filter(d=>d.tier==='hot'||d.tier==='rise');
  sortList(list,sort);
  const vHeaders=VOTE_DATES.map(d=>`<th>${d}順位</th>`).join('');
  let html=`<thead><tr><th style="text-align:left;">名前</th><th>reading</th><th>現在（万回）</th><th>週間+（万）</th><th>週間伸び率</th>${vHeaders}</tr></thead><tbody>`;
  list.forEach(d=>{
    const cls=d.tier==='hot'?'td-hot':d.tier==='rise'?'td-rise':'';
    const gPct=d.growPct!=null?`<span class="${cls}">+${d.growPct}%</span>`:'-';
    const gAbs=d.growAbs!=null?`<span class="${cls}">${d.growAbs>0?'+':''}${d.growAbs}</span>`:'-';
    const votes=VOTE_DATES.map((_,i)=>`<td>${d.votes[i]!=null?d.votes[i]+'位':'-'}</td>`).join('');
    html+=`<tr><td>${d.name}</td><td style="color:var(--hint);font-size:0.7rem;">${d.reading}</td><td>${d.cur.toFixed(1)}</td><td>${gAbs}</td><td>${gPct}</td>${votes}</tr>`;
  });
  html+='</tbody>';
  document.getElementById('all-table').innerHTML=html;
}

function renderTrend(){
  const ctx=document.getElementById('chartTrend');
  if(chartTrend){chartTrend.destroy();chartTrend=null;}
  if(!selected.length) return;
  const items=selected.map(n=>data.find(d=>d.name===n)).filter(Boolean);

  if(currentGraph==='play'){
    chartTrend=new Chart(ctx,{
      type:'line',
      data:{
        labels:PLAY_DATES,
        datasets:items.map((d,i)=>({
          label:d.name, data:d.vals,
          borderColor:palette[i%palette.length], backgroundColor:'transparent',
          tension:0.3, pointRadius:4, spanGaps:true,
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#888',font:{size:11},boxWidth:10,padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(1)+'万回':'-'}`}}
        },
        scales:{
          x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'万回',color:'#888',font:{size:11}}}
        }
      }
    });
  } else if(currentGraph==='growth'){
    // 週間伸び率（%）の折れ線グラフ
    const growthLabels=["3/6→3/14","3/14→3/21","3/21→3/28","3/28→4/4"];
    const datasets=items.map((d,i)=>{
      const rates=[];
      for(let j=1;j<d.vals.length;j++){
        const cur=d.vals[j], prev=d.vals[j-1];
        rates.push((cur!=null&&prev!=null&&prev>0) ? +((cur-prev)/prev*100).toFixed(1) : null);
      }
      return {
        label:d.name, data:rates,
        borderColor:palette[i%palette.length], backgroundColor:'transparent',
        tension:0.3, pointRadius:4, spanGaps:true,
      };
    });
    chartTrend=new Chart(ctx,{
      type:'line',
      data:{labels:growthLabels, datasets},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#888',font:{size:11},boxWidth:10,padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?'+'+c.parsed.y+'%':'-'}`}}
        },
        scales:{
          x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{ticks:{color:'#888',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'週間伸び率（%）',color:'#888',font:{size:11}}}
        }
      }
    });
  } else {
    const withVote=items.filter(d=>d.votes.length>0);
    if(!withVote.length) return;
    chartTrend=new Chart(ctx,{
      type:'line',
      data:{
        labels:VOTE_DATES,
        datasets:withVote.map((d,i)=>({
          label:d.name, data:d.votes,
          borderColor:palette[i%palette.length], backgroundColor:'transparent',
          tension:0.3, pointRadius:5, spanGaps:true,
          datalabels:{display:false},
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#888',font:{size:11},boxWidth:10,padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}位`}},
        },
        scales:{
          x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{reverse:true,ticks:{color:'#888',font:{size:11},callback:v=>v+'位'},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'順位（上が1位）',color:'#888',font:{size:11}}}
        },
        animation:{onComplete: function(){
          const chart=this;
          const ctx2=chart.ctx;
          ctx2.save();
          ctx2.font='bold 11px monospace';
          ctx2.textAlign='center';
          chart.data.datasets.forEach((ds,di)=>{
            const meta=chart.getDatasetMeta(di);
            if(meta.hidden) return;
            meta.data.forEach((pt,pi)=>{
              const val=ds.data[pi];
              if(val==null) return;
              ctx2.fillStyle=ds.borderColor;
              ctx2.fillText(val+'位', pt.x, pt.y-10);
            });
          });
          ctx2.restore();
        }}
      }
    });
  }
}

function renderScatter(){
  const canvas=document.getElementById('chartScatter');
  const tooltip=document.getElementById('scatter-tooltip');
  const filter=document.getElementById('scatter-filter').value;

  let list=data.filter(d=>d.votes.length>0&&d.growPct!=null);
  if(filter==='aa') list=list.filter(d=>d.clsLabel==='aa');
  else if(filter==='up') list=list.filter(d=>d.clsLabel==='up');
  else if(filter==='keep') list=list.filter(d=>d.clsLabel==='keep');
  else if(filter==='down') list=list.filter(d=>d.clsLabel==='down');
  else if(filter.startsWith('first-')) list=list.filter(d=>d.classFirst===filter.slice(6));
  else if(filter.startsWith('eval-')) list=list.filter(d=>d.classEval===filter.slice(5));

  const clsColors={aa:'#f0c040',up:'#4ec87a',keep:'#888884',down:'#ff5c35'};

  const W=canvas.parentElement.clientWidth||800;
  const H=440;
  canvas.width=W; canvas.height=H;
  const pad={top:20,right:30,bottom:50,left:60};
  const plotW=W-pad.left-pad.right;
  const plotH=H-pad.top-pad.bottom;

  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const xMin=1, xMax=101;
  const allY=list.map(d=>d.growPct);
  const yMin=Math.floor(Math.min(...allY,0)/10)*10;
  const yMax=Math.ceil(Math.max(...allY,10)/10)*10;

  function toCanvasX(rank){ return pad.left+(rank-xMin)/(xMax-xMin)*plotW; }
  function toCanvasY(pct){ return pad.top+(yMax-pct)/(yMax-yMin)*plotH; }

  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  for(let y=yMin;y<=yMax;y+=10){
    const cy=toCanvasY(y);
    ctx.beginPath(); ctx.moveTo(pad.left,cy); ctx.lineTo(W-pad.right,cy); ctx.stroke();
  }
  [1,25,50,75,101].forEach(rank=>{
    const cx=toCanvasX(rank);
    ctx.beginPath(); ctx.moveTo(cx,pad.top); ctx.lineTo(cx,H-pad.bottom); ctx.stroke();
  });

  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  const cy0=toCanvasY(0);
  ctx.beginPath(); ctx.moveTo(pad.left,cy0); ctx.lineTo(W-pad.right,cy0); ctx.stroke();

  ctx.fillStyle='#888884'; ctx.font='11px monospace'; ctx.textAlign='center';
  [1,25,50,75,101].forEach(rank=>{ ctx.fillText(rank+'位', toCanvasX(rank), H-pad.bottom+16); });
  ctx.textAlign='right';
  for(let y=yMin;y<=yMax;y+=10){
    ctx.fillText((y>=0?'+':'')+y+'%', pad.left-6, toCanvasY(y)+4);
  }
  ctx.fillStyle='#888884'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText('投票順位（左が1位・右が101位）', pad.left+plotW/2, H-4);
  ctx.save();
  ctx.translate(14, pad.top+plotH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('週間伸び率', 0, 0);
  ctx.restore();

  const points=[];
  list.forEach(d=>{
    const cx=toCanvasX(d.votes[0]);
    const cy=toCanvasY(d.growPct);
    const color=clsColors[d.clsLabel]||'#888884';
    ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
    ctx.fillStyle=color+'cc'; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=1; ctx.stroke();
    points.push({cx,cy,d});
  });

  canvas.onmousemove=function(e){
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    let hit=null;
    for(const p of points){
      const dx=p.cx-mx, dy=p.cy-my;
      if(Math.sqrt(dx*dx+dy*dy)<8){hit=p;break;}
    }
    if(hit){
      const d=hit.d;
      tooltip.style.display='block';
      tooltip.innerHTML=
        `<span style="color:${clsColors[d.clsLabel]};font-weight:500;">${d.name}</span> (${d.reading})<br>`+
        `クラス: ${d.classFirst}→${d.classEval}<br>`+
        `伸び率: +${d.growPct}%<br>`+
        `投票順位: ${d.votes[0]}位<br>`+
        `再生数: ${d.cur.toFixed(1)}万`;
      let tx=hit.cx+12, ty=hit.cy-10;
      if(tx+160>W) tx=hit.cx-170;
      if(ty+100>H) ty=H-110;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
    } else { tooltip.style.display='none'; }
  };
  canvas.onmouseleave=function(){ tooltip.style.display='none'; };
}

loadSelection();
document.getElementById('pick-count').textContent=selected.length+' / 12 選択中';
filterPicker();
renderWatch();
</script>
