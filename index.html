<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>再生数トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0ee;
    --muted: #888884;
    --hot: #ff5c35;
    --rise: #4ec87a;
    --steady: #666662;
    --accent: #c8b8ff;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  header p {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    padding: 0.75rem 1.25rem;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }

  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .tab:hover:not(.active) { color: var(--text); }

  .main { padding: 1.5rem 2rem 3rem; max-width: 1100px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* TOP10 */
  .section-label {
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: rgba(255,255,255,0.15); }

  .card-name {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-val {
    font-family: 'DM Mono', monospace;
    font-size: 1.35rem;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    font-size: 0.62rem;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .badge-hot { background: rgba(255,92,53,0.15); color: var(--hot); border: 1px solid rgba(255,92,53,0.3); }
  .badge-rise { background: rgba(78,200,122,0.12); color: var(--rise); border: 1px solid rgba(78,200,122,0.25); }
  .badge-steady { background: rgba(102,102,98,0.15); color: var(--steady); border: 1px solid rgba(102,102,98,0.25); }

  .chart-wrap { position: relative; width: 100%; }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  select, input[type=text] {
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, input[type=text]:focus { border-color: rgba(200,184,255,0.4); }

  input[type=text]::placeholder { color: var(--muted); }

  .ctrl-label {
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>PLAY COUNT TRACKER</h1>
  <p>101 candidates · 5 weeks · updated 2025-04-04</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('top')">急上昇 TOP10</button>
  <button class="tab" onclick="switchTab('all')">全員チャート</button>
  <button class="tab" onclick="switchTab('search')">名前で検索</button>
</div>

<div class="main">

  <div id="tab-top" class="section active">
    <p class="section-label">週間伸び率ランキング — 3/28 → 4/4</p>
    <div class="card-grid" id="top-cards"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#555"></span>先週</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--hot)"></span>急上昇 +40%↑</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--rise)"></span>上昇中 +10%↑</span>
    </div>
    <div class="chart-wrap" style="height:320px"><canvas id="chartTop"></canvas></div>
  </div>

  <div id="tab-all" class="section">
    <div class="controls">
      <span class="ctrl-label">並び替え</span>
      <select id="sortAll" onchange="renderAll()">
        <option value="growth">伸び率（高い順）</option>
        <option value="total">再生数（多い順）</option>
        <option value="name">名前順</option>
      </select>
      <select id="filterAll" onchange="renderAll()">
        <option value="all">全員</option>
        <option value="hot">急上昇のみ</option>
        <option value="rise">上昇中以上</option>
      </select>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--hot)"></span>急上昇</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--rise)"></span>上昇中</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--steady)"></span>安定</span>
    </div>
    <div class="chart-wrap" id="allWrap"><canvas id="chartAll"></canvas></div>
  </div>

  <div id="tab-search" class="section">
    <div class="controls">
      <input type="text" id="searchBox" placeholder="名前を入力..." oninput="renderSearch()">
    </div>
    <div class="chart-wrap" style="height:300px"><canvas id="chartSearch"></canvas></div>
  </div>

</div>

  ["岡田 侑磨",7.2,6.4,5.6,5.2,4.5],
  ["安部 結蘭",35,30,27,25,22],
  ["大林 悠成",8.5,6.7,5.6,5.1,4.5],
  ["佐野 由征",3.2,2.8,2.4,2.2,2],
  ["板倉 悠太",5.8,4,3,2.8,2.5],
];

const dates = ["4/4","3/28","3/21","3/14","3/6"];

const data = raw.map(r => {
  const name = r[0];
  const vals = r.slice(1);
  const cur = vals[0];
  const prev = vals[1];
  const weekGrowth = (prev != null && prev > 0) ? ((cur - prev) / prev * 100) : null;
  const tier = weekGrowth == null ? 'steady' : weekGrowth >= 40 ? 'hot' : weekGrowth >= 10 ? 'rise' : 'steady';
  return { name, vals, cur, prev, weekGrowth, tier };
});

const C = { hot: '#ff5c35', rise: '#4ec87a', steady: '#444442' };
const labels = { hot: '急上昇', rise: '上昇中', steady: '安定' };

let cTop = null, cAll = null, cSearch = null;

function switchTab(t) {
  ['top','all','search'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['top','all','search'][i]===t);
  });
  if (t==='top' && !cTop) renderTop();
  if (t==='all') renderAll();
  if (t==='search') renderSearch();
}

function renderTop() {
  const top10 = [...data].filter(d=>d.weekGrowth!=null).sort((a,b)=>b.weekGrowth-a.weekGrowth).slice(0,10);
  document.getElementById('top-cards').innerHTML = top10.map(d=>`
    <div class="card">
      <div class="card-name">${d.name}</div>
      <div class="card-val" style="color:${C[d.tier]}">+${d.weekGrowth.toFixed(1)}%</div>
      <div class="card-sub">${d.cur.toFixed(1)}万 <span class="badge badge-${d.tier}">${labels[d.tier]}</span></div>
    </div>
  `).join('');

  if (cTop) cTop.destroy();
  cTop = new Chart(document.getElementById('chartTop'), {
    type: 'bar',
    data: {
      labels: top10.map(d=>d.name.length>7?d.name.slice(0,7)+'…':d.name),
      datasets: [
        { label:'先週', data: top10.map(d=>d.prev), backgroundColor:'#333330' },
        { label:'今週', data: top10.map(d=>d.cur), backgroundColor: top10.map(d=>C[d.tier]) }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}万回` } } },
      scales:{
        x:{ ticks:{ color:'#888', font:{size:11}, autoSkip:false, maxRotation:35 }, grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{ color:'#888', font:{size:11} }, grid:{color:'rgba(255,255,255,0.04)'} }
      }
    }
  });
}

function renderAll() {
  const sort = document.getElementById('sortAll').value;
  const filter = document.getElementById('filterAll').value;
  let d2 = [...data];
  if (filter==='hot') d2=d2.filter(d=>d.tier==='hot');
  if (filter==='rise') d2=d2.filter(d=>d.tier==='hot'||d.tier==='rise');
  if (sort==='growth') d2.sort((a,b)=>(b.weekGrowth||0)-(a.weekGrowth||0));
  if (sort==='total') d2.sort((a,b)=>b.cur-a.cur);
  if (sort==='name') d2.sort((a,b)=>a.name.localeCompare(b.name,'ja'));

  document.getElementById('allWrap').style.height = Math.max(300, d2.length*26+60)+'px';

  if (cAll) cAll.destroy();
  cAll = new Chart(document.getElementById('chartAll'), {
    type:'bar',
    data:{
      labels: d2.map(d=>d.name.length>8?d.name.slice(0,8)+'…':d.name),
      datasets:[{ label:'再生数（万回）', data:d2.map(d=>d.cur), backgroundColor:d2.map(d=>C[d.tier]) }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c=>{ const item=d2[c.dataIndex]; const g=item.weekGrowth!=null?` +${item.weekGrowth.toFixed(1)}%`:''; return ` ${c.parsed.x.toFixed(1)}万回${g}`; } } } },
      scales:{
        x:{ ticks:{color:'#888',font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{color:'#888',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'} }
      }
    }
  });
}

function renderSearch() {
  const q = document.getElementById('searchBox').value;
  const matches = data.filter(d=>d.name.includes(q)).slice(0,8);
  if (cSearch) cSearch.destroy();
  if (!matches.length) return;
  const palette = ['#ff5c35','#4ec87a','#c8b8ff','#f0c040','#60c8e0','#e080c0','#80d060','#a0a8ff'];
  cSearch = new Chart(document.getElementById('chartSearch'),{
    type:'line',
    data:{
      labels:[...dates].reverse(),
      datasets: matches.map((d,i)=>({
        label:d.name, data:[...d.vals].reverse(),
        borderColor:palette[i%palette.length], backgroundColor:'transparent',
        tension:0.3, pointRadius:4, spanGaps:true
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, position:'bottom', labels:{ color:'#888', font:{size:11}, boxWidth:10, padding:10 } }, tooltip:{ callbacks:{ label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(1)+'万回':'-'}` } } },
      scales:{
        x:{ ticks:{color:'#888',font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{color:'#888',font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} }
      }
    }
  });
}

renderTop();
</script>
</body>
</html>
